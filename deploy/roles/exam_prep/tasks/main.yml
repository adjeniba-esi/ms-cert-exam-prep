---
# Le répertoire source (exam_prep_src = racine du dépôt ms-cert-exam-prep)
# sert de contexte Docker. On y copie temporairement Dockerfile.k8s,
# nginx-exam.conf et start.sh le temps du build, puis on les supprime.

- name: Copier les fichiers statiques de build dans le contexte Docker
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "{{ exam_prep_src }}/{{ item | basename }}"
    mode: "0644"
  loop:
    - Dockerfile.k8s
    - nginx-exam.conf

- name: Générer start.sh depuis le template (cors-origin = ingress_domain)
  ansible.builtin.template:
    src: start.sh.j2
    dest: "{{ exam_prep_src }}/start.sh"
    mode: "0755"

- name: Construire l'image Docker {{ exam_prep_image }}
  ansible.builtin.command:
    cmd: >
      docker build
      -f {{ exam_prep_src }}/Dockerfile.k8s
      -t {{ exam_prep_image }}
      {{ exam_prep_src }}
  changed_when: true

- name: Supprimer les fichiers de build temporaires du contexte Docker
  ansible.builtin.file:
    path: "{{ exam_prep_src }}/{{ item }}"
    state: absent
  loop:
    - Dockerfile.k8s
    - nginx-exam.conf
    - start.sh

- name: Charger l'image dans le cluster kind {{ kind_cluster_name }}
  ansible.builtin.command: >
    {{ local_bin_dir }}/kind load docker-image {{ exam_prep_image }}
    --name {{ kind_cluster_name }}
  changed_when: true

- name: Générer les manifestes Kubernetes (Deployment + Service + Ingress)
  ansible.builtin.template:
    src: exam-prep-manifests.yaml.j2
    dest: /tmp/exam-prep-manifests.yaml
    mode: "0644"

- name: Appliquer les manifestes
  ansible.builtin.command: >
    {{ local_bin_dir }}/kubectl apply -f /tmp/exam-prep-manifests.yaml
  register: exam_apply
  changed_when: "'unchanged' not in exam_apply.stdout"

- name: Relancer le Deployment pour appliquer la nouvelle image
  ansible.builtin.command: >
    {{ local_bin_dir }}/kubectl -n {{ demo_namespace }}
    rollout restart deployment/exam-prep
  changed_when: true

- name: Attendre que le Deployment exam-prep soit Ready
  ansible.builtin.command: >
    {{ local_bin_dir }}/kubectl -n {{ demo_namespace }}
    rollout status deployment/exam-prep --timeout=120s
  changed_when: false

- name: Afficher l'URL d'accès
  ansible.builtin.debug:
    msg: "Disponible sur : https://{{ ingress_domain }}/prep-exam/"
