server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    absolute_redirect off;

    location = /prep-exam {
        return 301 /prep-exam/;
    }

    # Proxy API → serve.py (port 8081 interne)
    # Retire le préfixe /prep-exam avant de transmettre
    location ~ ^/prep-exam(/api/[^?]*)(.*)$ {
        proxy_pass         http://127.0.0.1:8081$1$is_args$args;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # Bloquer l'accès direct aux credentials admin
    location = /prep-exam/data/admin.js {
        return 403;
    }

    # Données et examens servis depuis /app/ (même source que serve.py)
    # Permet à l'admin de modifier une question et de la voir immédiatement
    location /prep-exam/data/ {
        alias /app/data/;
    }

    location /prep-exam/exams/ {
        alias /app/exams/;
    }

    location /prep-exam/ {
        try_files $uri $uri/ =404;
    }
}
